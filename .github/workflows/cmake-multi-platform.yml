name: Multi-Platform Nightly Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 0 * * *'  # Runs at midnight UTC
  workflow_dispatch:      # Allows you to click "Run workflow" manually

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        # We use 'include' to map the correct compilers to each OS directly
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++

    steps:
    - uses: actions/checkout@v4

    # 1. SETUP PYTHON (Fixes the Exit Code 1 error)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 2. INSTALL QT (Now uses the Python we just set up)
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.*'
        modules: 'qtcharts qtdeclarative qtsql'
        setup-python: 'false' # Tells the action NOT to try installing its own Python

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DBUILD_TESTING=ON
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: baseball-app-${{ matrix.os }}
        path: |
          ${{ steps.strings.outputs.build-output-dir }}/**/CS_1D_BaseBall.exe
          ${{ steps.strings.outputs.build-output-dir }}/**/CS_1D_BaseBall
          ${{ steps.strings.outputs.build-output-dir }}/**/CS_1D_BaseBall.app
        if-no-files-found: warn

  create_release:
    needs: build
    runs-on: ubuntu-latest
    # Only creates the formal "Release" for scheduled nightly runs or manual triggers
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_id }}
          name: Nightly Build ${{ github.run_number }}
          body: "Automated nightly build for Baseball Project. Supports Windows, macOS, and Linux."
          draft: false
          prerelease: true
          files: |
            **/CS_1D_BaseBall.exe
            **/CS_1D_BaseBall
            **/CS_1D_BaseBall.app/*
